name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Secret VERCEL_TOKEN ausente ou vazio."; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Secret VERCEL_ORG_ID ausente ou vazio."; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Secret VERCEL_PROJECT_ID ausente ou vazio."; exit 1; }

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prod --token="$VERCEL_TOKEN"
